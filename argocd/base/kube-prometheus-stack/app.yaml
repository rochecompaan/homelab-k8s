apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '3'
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 79.12.0
    helm:
      releaseName: kube-prometheus-stack
      valuesObject:
        grafana:
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          deploymentStrategy:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 0
              maxUnavailable: 1
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: compaan-ca
            hosts:
              - grafana.compaan
            path: /
            pathType: Prefix
            tls:
              - secretName: grafana-compaan-tls
                hosts:
                  - grafana.compaan
          persistence:
            enabled: false
          sidecar:
            alerts:
              enabled: true
          plugins:
            - victoriametrics-logs-datasource
          grafana.ini:
            server:
              domain: grafana.compaan
              root_url: https://%(domain)s
          env:
            GF_DATABASE_TYPE: postgres
            GF_DATABASE_HOST: grafana-postgres-rw.monitoring.svc.cluster.local:5432
            GF_DATABASE_NAME: grafana
            GF_DATABASE_USER: grafana
            GF_DATABASE_SSL_MODE: disable
          envValueFrom:
            GF_DATABASE_PASSWORD:
              secretKeyRef:
                name: grafana-postgres-app
                key: password
          additionalDataSources:
            - name: VictoriaLogs
              type: victoriametrics-logs-datasource
              uid: victorialogs_ds
              access: proxy
              url: http://victoria-logs-victoria-logs-single-server.victoria-logs.svc.cluster.local:9428
              isDefault: false
        prometheusOperator:
          resources:
            limits:
              cpu: 100m
              memory: 200Mi
            requests:
              cpu: 50m
              memory: 100Mi
        prometheus:
          server:
            persistentVolume:
              enabled: true
          prometheusSpec:
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            retention: 60d
            retentionSize: 16GB
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: {}
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-benchmark-rwx-mayastor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '6'
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:rochecompaan/homelab-k8s.git
    targetRevision: main
    path: argocd/homelab/storage-benchmark-rwx-mayastor
  destination:
    server: https://kubernetes.default.svc
    namespace: storage-benchmark-rwx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

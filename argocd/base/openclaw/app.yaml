            config:
              data:
                openclaw.json: |
                  {
                    // Environment variables used by model provider integrations
                    "env": {
                      "MATRIX_ACCESS_TOKEN": "${MATRIX_ACCESS_TOKEN}",
                      "OPENCLAW_GATEWAY_TOKEN": "${OPENCLAW_GATEWAY_TOKEN}",
                      "OPENROUTER_API_KEY": "${OPENROUTER_API_KEY}"
                    },

                    // Plugin configuration
                    "plugins": {
                      "entries": {
                        "openai": {
                          "enabled": true
                        }
                      }
                    },

                    // Gateway configuration
                    "gateway": {
                      "port": 18789,
                      "mode": "local",
                      "controlUi": {
                        "dangerouslyAllowHostHeaderOriginFallback": true
                      },
                      // IMPORTANT: trustedProxies uses exact IP matching only
                      // - CIDR notation is NOT supported - list each proxy IP individually
                      // - IPv6 exact addresses may work but are untested
                      // - Recommend single-stack IPv4 deployments for simplicity
                      "trustedProxies": [
                        "10.0.0.1"
                      ]
                    },

                    // Browser configuration (Chromium sidecar)
                    "browser": {
                      "enabled": true,
                      "defaultProfile": "default",
                      "profiles": {
                        "default": {
                          "cdpUrl": "http://localhost:9222",
                          "color": "#4285F4"
                        }
                      }
                    },

                    // Agent configuration
                    "agents": {
                      "defaults": {
                        "workspace": "/home/node/.openclaw/workspace",
                        "model": {
                          // Uses ChatGPT/Codex subscription auth via the PI runtime
                          "primary": "openai-codex/gpt-5.5"
                        },
                        "agentRuntime": {
                          "id": "pi",
                          "fallback": "none"
                        },
                        "userTimezone": "UTC",
                        "timeoutSeconds": 600,
                        "maxConcurrent": 1
                      },
                      "list": [
                        {
                          "id": "main",
                          "default": true,
                          "identity": {
                            "name": "OpenClaw",
                            "emoji": "\ud83e\udd9e"
                          }
                        }
                      ]
                    },

                    // Session management
                    "session": {
                      "scope": "per-sender",
                      "store": "/home/node/.openclaw/sessions",
                      "reset": {
                        "mode": "idle",
                        "idleMinutes": 60
                      }
                    },

                    // Logging
                    "logging": {
                      "level": "info",
                      "consoleLevel": "info",
                      "consoleStyle": "compact",
                      "redactSensitive": "tools"
                    },

                    // Tools configuration
                    "tools": {
                      "profile": "full",
                      "web": {
                        "search": {
                          "enabled": false
                        },
                        "fetch": {
                          "enabled": true
                        }
                      }
                    },

                    // Channel configuration
                    "channels": {
                      "matrix": {
                        "enabled": true,
                        "homeserver": "https://matrix.compaan",
                        "accessToken": "${MATRIX_ACCESS_TOKEN}",
                        "dm": {
                          "policy": "pairing",
                          "sessionScope": "per-room"
                        }
                      }
                    }
                  }
          persistence:
            data:
              storageClass: longhorn
              size: 10Gi
              advancedMounts:
                main:
                  init-runtime-deps:
                    - path: /home/node/.openclaw
            ca-bundle:
              enabled: true
              type: configMap
              identifier: ca-bundle
              advancedMounts:
                main:
                  init-ca-store:
                    - path: /ca-src/compaan-ca.crt
                      subPath: compaan-ca.crt
                      readOnly: true
                  main:
                    - path: /etc/ssl/certs/compaan-ca.crt
                      subPath: compaan-ca.crt
                      readOnly: true
            ca-store:
              enabled: true
              type: emptyDir
              advancedMounts:
                main:
                  init-ca-store:
                    - path: /ca-store
                  main:
                    - path: /etc/ssl/certs/ca-certificates.crt
                      subPath: ca-certificates.crt
            mail:
              enabled: true
              type: persistentVolumeClaim
              existingClaim: openclaw-maildir
              globalMounts:
                - path: /home/node/.openclaw/workspace/mail
                  readOnly: false
          ingress:
            main:
              enabled: true
              className: traefik
              annotations:
                cert-manager.io/cluster-issuer: compaan-ca
              tls:
                - secretName: openclaw-compaan-tls-v2
                  hosts:
                    - openclaw.compaan
              hosts:
                - host: openclaw.compaan
                  paths:
                    - path: /
                      pathType: Prefix
                      service:
                        identifier: main
                        port: http
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '4'
spec:
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: openclaw
      jsonPointers:
        - /data
  project: default
  source:
    chart: openclaw
    repoURL: https://serhanekicii.github.io/openclaw-helm/
    targetRevision: 1.5.30
    helm:
      releaseName: openclaw
      valuesObject:
        app-template:
          openclawVersion: "2026.5.2-slim"
          configMode: merge
          controllers:
            main:
              initContainers:
                init-ca-store:
                  command:
                    - sh
                    - -c
                    - |
                      set -eu

                      cp /etc/ssl/certs/ca-certificates.crt /ca-store/ca-certificates.crt
                      printf '\n' >> /ca-store/ca-certificates.crt
                      cat /ca-src/compaan-ca.crt >> /ca-store/ca-certificates.crt
                  image:
                    repository: ghcr.io/openclaw/openclaw
                    tag: "2026.5.2-slim"
                  securityContext:
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop:
                        - ALL
                    readOnlyRootFilesystem: true
                    runAsGroup: 1000
                    runAsNonRoot: true
                    runAsUser: 1000
                init-runtime-deps:
                  image:
                    repository: debian
                    tag: bookworm-slim
                  securityContext:
                    readOnlyRootFilesystem: false
                    runAsNonRoot: false
                    runAsUser: 0
                    runAsGroup: 0
                  command:
                    - sh
                    - -c
                    - |
                      set -eu

                      openclaw_home=/home/node/.openclaw
                      bin_dir="${openclaw_home}/bin"
                      lib_dir="${openclaw_home}/lib"
                      runtime_bin_dir="${openclaw_home}/runtime-bin"
                      python_dir="${openclaw_home}/python"
                      workspace_dir="${openclaw_home}/workspace"
                      skills_dir="${workspace_dir}/skills"

                      install -d -m 0755 -o 1000 -g 1000 \
                        "${openclaw_home}" \
                        "${bin_dir}" \
                        "${lib_dir}" \
                        "${runtime_bin_dir}" \
                        "${python_dir}" \
                        "${workspace_dir}" \
                        "${skills_dir}"

                      export DEBIAN_FRONTEND=noninteractive
                      apt-get update
                      apt-get install -y --no-install-recommends ca-certificates ghostscript mupdf-tools poppler-utils qpdf
                      rm -rf /var/lib/apt/lists/*

                      rm -f \
                        "${bin_dir}/pdfimages" \
                        "${bin_dir}/pdfinfo" \
                        "${bin_dir}/pdftoppm" \
                        "${bin_dir}/pdftotext" \
                        "${bin_dir}/qpdf" \
                        "${bin_dir}/mutool" \
                        "${bin_dir}/gs" \
                        "${runtime_bin_dir}"/* \
                        "${lib_dir}"/*

                      ldd /usr/bin/pdfimages /usr/bin/pdfinfo /usr/bin/pdftoppm /usr/bin/pdftotext /usr/bin/qpdf /usr/bin/mutool /usr/bin/gs \
                        | awk '/=> \// { print $3 } /^[[:space:]]*\/[^:[:space:]]+[[:space:]]/ { print $1 }' \
                        | sort -u \
                        | while read -r lib; do
                            [ -n "${lib}" ] || continue
                            case "${lib}" in
                              */ld-linux-*.so.*|*/libc.so.*)
                                continue
                                ;;
                            esac
                            cp -L "${lib}" "${lib_dir}/"
                          done

                      for bin in pdfimages pdfinfo pdftoppm pdftotext qpdf mutool gs; do
                        install -m 0755 "$(command -v "${bin}")" "${runtime_bin_dir}/${bin}"
                        printf '%s\n' \
                          '#!/bin/sh' \
                          "exec env LD_LIBRARY_PATH=\"${lib_dir}\" \"${runtime_bin_dir}/${bin}\" \"\$@\"" \
                          > "${bin_dir}/${bin}"
                        chmod 0755 "${bin_dir}/${bin}"
                      done

                      chown -R 1000:1000 "${bin_dir}" "${lib_dir}" "${runtime_bin_dir}"
                init-skills:
                  command:
                    - sh
                    - -c
                    - |
                      log() { echo "[$(date -Iseconds)] [init-skills] $*"; }

                      log "Starting skills initialization"

                      mkdir -p /home/node/.openclaw/bin
                      if [ ! -x /home/node/.openclaw/bin/uv ]; then
                        log "Installing uv..."
                        curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/home/node/.openclaw/bin sh
                      fi

                      if [ ! -x /home/node/.openclaw/python/bin/python ]; then
                        log "Creating Python environment"
                        /home/node/.openclaw/bin/uv venv --python 3.12 /home/node/.openclaw/python
                      fi

                      log "Installing Python PDF dependencies"
                      UV_LINK_MODE=copy /home/node/.openclaw/bin/uv pip install \
                        --python /home/node/.openclaw/python/bin/python \
                        pypdf \
                        pdfplumber \
                        pymupdf \
                        PyPDF2 \
                        pdfminer.six

                      mkdir -p /home/node/.openclaw/workspace/skills
                      cd /home/node/.openclaw/workspace
                      for skill in weather; do
                        if [ -n "$skill" ] && [ ! -d "skills/${skill##*/}" ]; then
                          log "Installing skill: $skill"
                          if ! npx -y clawhub install "$skill" --no-input; then
                            log "WARNING: Failed to install skill: $skill"
                          fi
                        else
                          log "Skill already installed: $skill"
                        fi
                      done
                      log "Skills initialization complete"
              containers:
                main:
                  env:
                    CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
                    MATRIX_ACCESS_TOKEN:
                      valueFrom:
                        secretKeyRef:
                          key: MATRIX_ACCESS_TOKEN
                          name: openclaw-env-secret
                    NODE_EXTRA_CA_CERTS: /etc/ssl/certs/compaan-ca.crt
                    PATH: /home/node/.openclaw/bin:/home/node/.openclaw/python/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
                    REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
                    SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
                  envFrom:
                    - secretRef:
                        name: openclaw-env-secret

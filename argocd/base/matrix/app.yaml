apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matrix
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '4'
spec:
  project: default
  source:
    chart: matrix
    repoURL: https://remram44.github.io/matrix-helm
    targetRevision: 2.9.16
    helm:
      releaseName: matrix
      valuesObject:
        homeserverConfig:
          server_name: matrix.compaan
          public_baseurl: https://matrix.compaan/
          web_client_location: https://matrix.compaan/
          app_service_config_files:
            - /etc/synapse/appservices/whatsapp-registration.yaml
          email:
            app_name: Matrix
            client_base_url: https://matrix.compaan/
          trusted_key_servers: []
          report_stats: false
          turn_uris:
            - turn:turn.matrix.compaan:3478?transport=tcp
          turn_user_lifetime: 1h
        extraConfig:
          - key: turn_shared_secret
            secret:
              yaml: false
              name: matrix
              key: registration_shared_secret
        secret:
          name: matrix
          generate: false
        extraVolumes:
          - name: whatsapp-appservice
            secret:
              secretName: matrix-whatsapp-appservice
              items:
                - key: registration.yaml
                  path: whatsapp-registration.yaml
        extraVolumeMounts:
          - name: whatsapp-appservice
            mountPath: /etc/synapse/appservices
            readOnly: true
        ingress:
          enabled: true
          exposeWellKnown: false
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: compaan-ca
          hosts:
            - matrix.compaan
          tls:
            - secretName: matrix-compaan-tls
              hosts:
                - matrix.compaan
        storage:
          storageClass: longhorn
          capacity: 10Gi
        element:
          enabled: false
        postgresql:
          auth:
            existingSecret: matrix-postgresql
          primary:
            persistence:
              enabled: true
              storageClass: longhorn
              size: 8Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: matrix
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true

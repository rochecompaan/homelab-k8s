apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo-runner
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '5'
spec:
  project: default
  source:
    repoURL: codeberg.org/wrenix/helm-charts
    chart: forgejo-runner
    targetRevision: 0.7.6
    helm:
      releaseName: forgejo-runner
      valuesObject:
        knownLastVersion: true
        replicaCount: 1
        runner:
          config:
            create: true
            existingInitSecret: forgejo-runner-init
            instance: http://forgejo-http.forgejo.svc.cluster.local:3000
            file:
              runner:
                capacity: 1
                env_file: ''
                envs:
                  A_TEST_ENV_NAME_1: null
                  A_TEST_ENV_NAME_2: null
                  DOCKER_CERT_PATH: /certs/client
                  DOCKER_HOST: tcp://127.0.0.1:2376
                  DOCKER_TLS_VERIFY: '1'
                labels:
                  - ubuntu-latest:docker://catthehacker/ubuntu:act-latest
                  - ubuntu-22.04:docker://catthehacker/ubuntu:act-22.04
                  - docker:docker://docker:29-cli
              container:
                network: host
                options: -v /certs/client:/certs/client
                valid_volumes:
                  - /certs/client
  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true

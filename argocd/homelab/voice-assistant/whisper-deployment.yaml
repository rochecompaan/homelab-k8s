apiVersion: apps/v1
kind: Deployment
metadata:
  name: wyoming-whisper
  labels:
    app: wyoming-whisper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wyoming-whisper
  template:
    metadata:
      labels:
        app: wyoming-whisper
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: whisper
          image: rhasspy/wyoming-whisper@sha256:308b7959a925d0cca381c3e6e77292fed87822695635db39c24199d6b7a9e610  # yamllint disable-line rule:line-length
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /data
            - name: HF_HOME
              value: /data/huggingface
            - name: HF_HUB_CACHE
              value: /data/huggingface/hub
            - name: HF_XET_CACHE
              value: /data/huggingface/xet
          args:
            - --model
            - base-int8
            - --language
            - en
          ports:
            - name: wyoming
              containerPort: 10300
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          startupProbe:
            tcpSocket:
              port: wyoming
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: wyoming
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: wyoming
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wyoming-whisper-data

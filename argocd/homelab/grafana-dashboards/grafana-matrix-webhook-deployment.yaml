apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-matrix-webhook
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-matrix-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-matrix-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-matrix-webhook
    spec:
      automountServiceAccountToken: false
      containers:
        - name: webhook
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command:
            - python3
            - -u
            - -m
            - grafana_matrix_webhook
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MATRIX_HOMESERVER
              value: https://matrix.compaan
            - name: MATRIX_ROOM_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-matrix-webhook
                  key: MATRIX_ROOM_ID
            - name: MATRIX_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-matrix-webhook
                  key: MATRIX_ACCESS_TOKEN
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: app
          configMap:
            name: grafana-matrix-webhook
            defaultMode: 0555

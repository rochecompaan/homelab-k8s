apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-log-errors
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  log-errors.yml: |-
    apiVersion: 1
    groups:
      - orgId: 1
        name: Log Errors
        folder: Homelab Alerts
        interval: 30s
        rules:
          - uid: homelab_log_errors
            title: homelab log errors detected
            condition: C
            data:
              - refId: A
                queryType: stats
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victorialogs_ds
                model:
                  datasource:
                    type: victoriametrics-logs-datasource
                    uid: victorialogs_ds
                  editorMode: code
                  expr: '_time: 10m AND ((log.level:* AND log.level:~"(?i)^(error|fatal|panic)$") OR (log.record.error_severity:* AND log.record.error_severity:~"(?i)^(error|fatal|panic)$") OR (NOT log.level:* AND NOT log.record.error_severity:* AND (_msg:~"(?i)(^| )level=(error|fatal|panic)( |$)" OR (NOT _msg:~"(?i)(^| )level=(trace|debug|info|warn|warning)( |$)" AND _msg:~"(?i)(error|exception|panic|fatal)")))) AND NOT ~"(?i)(readiness probe failed|liveness probe failed|rule_uid=homelab_log_errors|level=(info|debug)|Ignoring error because|Database locked, sleeping then retrying|slow query according to -search.logSlowQueryDuration|^.* - synapse[.]http[.]server - .* - INFO -|media/preview_url.*SynapseError: 404 - Unrecognized request|404 .*GET /_matrix/client/v1/media/preview_url|Applying resource ConfigMap/alert-log-errors|Writing /etc/grafana/provisioning/alerting/log-errors|Socket error on imap[.]gmail[.]com [(][0-9.]+:993[)]: timeout[.]?|[[]ERROR[]] plugin/errors: 2 imap[.]gmail[.]com[.] AAAA: read udp [0-9.]+:[0-9]+->[0-9.]+:53: i/o timeout|IMAP command ''UID FETCH [0-9:]+ [(]UID FLAGS[)]'' returned an error: Some messages could not be FETCHed [(]Failure[)]|garage_web::web_server.*GET 404 Not Found.*API error: Key not found|Error while handling TCP connection.*readfrom tcp [0-9.]+:[0-9]+->[0-9.]+:3022: read tcp [0-9.]+:8443->[0-9.]+:[0-9]+: read: connection reset by peer|source=collector[.]go:168 msg=.collector failed. name=thermal_zone.*err=.invalid argument.|Jellyfin[.]Database[.]Implementations[.]JellyfinDbContext: Error trying to save changes[.]|Microsoft[.]EntityFrameworkCore[.]DbUpdateConcurrencyException: The database operation was expected to affect 1 row[(]s[)], but actually affected 0 row[(]s[)]|AffectedCountModificationCommandBatch[.]ThrowAggregateUpdateConcurrencyExceptionAsync|Failed to get filesystem device type of .*collectNodeDiskCount.*controller=longhorn-setting|synapse[.]media[.]thumbnailer.*Error parsing image EXIF information|pychromecast[.]socket_client.*(Failed to connect to service HostServiceInfo|Error reading from socket: socket connection broken)|[[]metno[]].*api[.]met[.]no/weatherapi/locationforecast.*ClientConnectorDNSError|homeassistant[.]components[.]met[.]coordinator.*Error fetching met data: Update of data from the web site failed|Error reading from websocket: failed to get reader: failed to read frame header: EOF.*component=whatsmeow|infra[.]usagestats.*grafana-amazonprometheus-datasource not found|infra[.]usagestats[.]collector.*Failed to get advisor usage stats.*checks[.]advisor[.]grafana[.]app|failed to set write deadline, connection is fully closed|DiffFromCache error: error getting managed resources for app openebs-mayastor: cache: key is missing|no edge forwarder found for edge circuit|source=collector[.]go:168 msg=.collector failed. name=powersupplyclass.*charge_types.: input/output error|pstor::etcd_watcher: Polling watch stream error, error: grpc request error: status: Unknown, message: .h2 protocol error: error reading a body from connection.|pstor::etcd_keep_alive: error: Reconnect[(]Reconnect[(]1s[)][)]|pstor::etcd_keep_alive: error: LeaseGrant[(]LeaseGrant[)]|payload buffer closed|Error checking new version error=.GET https://api[.]github[.]com/repos/traefik/traefik/releases: 403 API rate limit exceeded.*rate reset in [0-9]+m[0-9]+s|garage_api_common::generic_server: Response: error 403 Forbidden, Forbidden: Garage does not support anonymous access yet|garage_web::web_server.*POST 400 Bad Request.*HTTP method not supported)" | copy _msg as error_fingerprint | unpack_logfmt fields (logger, level, msg, dsName, dsUid, endpoint, status, statusSource, uname, pluginId) | format if (logger:=plugin.victoriametrics-logs-datasource and msg:="Plugin Request Completed" and status:=error) "logger=<logger> level=<level> msg=\"<msg>\" dsName=<dsName> dsUid=<dsUid> endpoint=<endpoint> status=<status> statusSource=<statusSource> uname=<uname> pluginId=<pluginId>" as error_fingerprint | collapse_nums at error_fingerprint | replace_regexp ("[a-f0-9]{8,}", "<hex>") at error_fingerprint | replace_regexp ("[a-z0-9-]+-[a-f0-9]{8,10}-[a-z0-9]{5}", "<pod>") at error_fingerprint | stats by (error_fingerprint) count() errors'
                  intervalMs: 1000
                  maxDataPoints: 43200
                  queryType: stats
                  refId: A
              - refId: B
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - B
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  intervalMs: 1000
                  maxDataPoints: 43200
                  reducer: last
                  refId: B
                  type: reduce
              - refId: C
                datasourceUid: __expr__
                model:
                  conditions:
                    - evaluator:
                        params:
                          - 2
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                          - C
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  intervalMs: 1000
                  maxDataPoints: 43200
                  refId: C
                  type: threshold
            noDataState: OK
            execErrState: Error
            for: 5m
            annotations:
              summary: Repeated error log pattern detected in homelab
              description: VictoriaLogs found 3 or more recent error, exception, panic, or fatal log entries with the same normalized fingerprint. Review the grouped fingerprint in Grafana for the exact source.
            labels:
              severity: warning
              team: sre
              cluster: homelab
              service: logs
            isPaused: false

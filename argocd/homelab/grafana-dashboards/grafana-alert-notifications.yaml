apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-notifications
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  notifications.yml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: homelab-matrix-alerts
        receivers:
          - uid: homelab_matrix_alerts_webhook
            type: webhook
            disableResolveMessage: false
            settings:
              url: http://grafana-matrix-webhook.monitoring.svc.cluster.local:8080/alert
              httpMethod: POST
              maxAlerts: "10"
              title: '{{ template "default.title" . }}'
              message: |-
                {{ if .Alerts.Firing }}
                <span data-mx-color="#D50000"><strong>🚨 Firing</strong></span>
                {{ range .Alerts.Firing }}
                {{ if .Labels.error_fingerprint }}
                Error fingerprint: {{ .Labels.error_fingerprint }}
                {{ else if .Labels._msg }}
                Error: {{ .Labels._msg }}
                {{ else if .Annotations.description }}
                {{ .Annotations.description }}
                {{ else if .Annotations.summary }}
                {{ .Annotations.summary }}
                {{ else }}
                {{ .Labels.alertname }}
                {{ end }}
                {{ end }}
                {{ end }}
                {{ if .Alerts.Resolved }}
                <span data-mx-color="#00C853"><strong>✅ Resolved</strong></span>
                {{ range .Alerts.Resolved }}
                {{ if .Labels.error_fingerprint }}
                Error fingerprint: {{ .Labels.error_fingerprint }}
                {{ else if .Labels._msg }}
                Error: {{ .Labels._msg }}
                {{ else if .Annotations.description }}
                {{ .Annotations.description }}
                {{ else if .Annotations.summary }}
                {{ .Annotations.summary }}
                {{ else }}
                {{ .Labels.alertname }}
                {{ end }}
                {{ end }}
                {{ end }}
      - orgId: 1
        name: homelab-matrix-log-alerts
        receivers:
          - uid: homelab_matrix_log_alerts_webhook
            type: webhook
            disableResolveMessage: true
            settings:
              url: http://grafana-matrix-webhook.monitoring.svc.cluster.local:8080/alert
              httpMethod: POST
              maxAlerts: "10"
              title: '{{ template "default.title" . }}'
              message: |-
                {{ if .Alerts.Firing }}
                <span data-mx-color="#D50000"><strong>🚨 Firing</strong></span>
                {{ range .Alerts.Firing }}
                {{ if .Labels.error_fingerprint }}
                Error fingerprint: {{ .Labels.error_fingerprint }}
                {{ else if .Labels._msg }}
                Error: {{ .Labels._msg }}
                {{ else if .Annotations.description }}
                {{ .Annotations.description }}
                {{ else if .Annotations.summary }}
                {{ .Annotations.summary }}
                {{ else }}
                {{ .Labels.alertname }}
                {{ end }}
                {{ end }}
                {{ end }}
    policies:
      - orgId: 1
        receiver: homelab-matrix-alerts
        group_by:
          - grafana_folder
          - alertname
          - severity
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - receiver: homelab-matrix-log-alerts
            object_matchers:
              - - service
                - =
                - logs
            group_by:
              - grafana_folder
              - alertname
              - severity
            group_wait: 1m
            group_interval: 30m
            repeat_interval: 12h

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-notifications
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  notifications.yml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: homelab-matrix-alerts
        receivers:
          - uid: homelab_matrix_alerts_webhook
            type: webhook
            disableResolveMessage: false
            settings:
              url: http://grafana-matrix-webhook.monitoring.svc.cluster.local:8080/alert
              httpMethod: POST
              maxAlerts: "10"
              title: '{{ template "default.title" . }}'
              message: |-
                {{ if .Alerts.Firing }}
                <font color="#D50000"><b>🚨 Firing</b></font>
                {{ range .Alerts.Firing }}
                {{ if .Labels._msg }}
                Error: {{ .Labels._msg }}
                {{ else if .Annotations.description }}
                {{ .Annotations.description }}
                {{ else if .Annotations.summary }}
                {{ .Annotations.summary }}
                {{ else }}
                {{ .Labels.alertname }}
                {{ end }}
                {{ end }}
                {{ end }}
                {{ if .Alerts.Resolved }}
                <font color="#00C853"><b>✅ Resolved</b></font>
                {{ range .Alerts.Resolved }}
                {{ if .Labels._msg }}
                Error: {{ .Labels._msg }}
                {{ else if .Annotations.description }}
                {{ .Annotations.description }}
                {{ else if .Annotations.summary }}
                {{ .Annotations.summary }}
                {{ else }}
                {{ .Labels.alertname }}
                {{ end }}
                {{ end }}
                {{ end }}
    policies:
      - orgId: 1
        receiver: homelab-matrix-alerts
        group_by:
          - grafana_folder
          - alertname
          - severity
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

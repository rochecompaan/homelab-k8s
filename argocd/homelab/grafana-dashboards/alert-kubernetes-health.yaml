apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-kubernetes-health
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  kubernetes-health.yml: |
    apiVersion: 1
    groups:
    - orgId: 1
      name: Kubernetes Health - homelab
      folder: Homelab Alerts
      interval: 1m
      rules:
      - uid: homelab_kubernetes_node_not_ready
        title: homelab Kubernetes node NotReady
        condition: C
        for: 5m
        annotations:
          summary: Kubernetes node NotReady on homelab node {{ $labels.node }}
          description: 'Cluster homelab node {{ $labels.node }} has been NotReady for more than 5 minutes (current value: {{ $value }}).'
        labels:
          severity: critical
          team: sre
          cluster: homelab
        data:
        - refId: A
          queryType: query
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: kube_node_status_condition{condition="Ready",status="true"}
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: reduce
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            reducer: last
            refId: B
            type: reduce
        - refId: C
          queryType: threshold
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 1
                type: lt
              operator:
                type: and
              query:
                params:
                - C
              reducer:
                params: []
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: B
            intervalMs: 1000
            maxDataPoints: 43200
            refId: C
            type: threshold
        noDataState: Alerting
        execErrState: Error
        isPaused: false
      - uid: homelab_pod_crash_looping
        title: homelab pod CrashLoopBackOff
        condition: C
        for: 5m
        annotations:
          summary: Pod CrashLoopBackOff on homelab namespace {{ $labels.namespace }} pod {{ $labels.pod }}
          description: 'Cluster homelab namespace {{ $labels.namespace }} pod {{ $labels.pod }} container {{ $labels.container }} is in CrashLoopBackOff for more than 5 minutes (current value: {{ $value }}).'
        labels:
          severity: critical
          team: sre
          cluster: homelab
        data:
        - refId: A
          queryType: query
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: reduce
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            reducer: last
            refId: B
            type: reduce
        - refId: C
          queryType: threshold
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
              operator:
                type: and
              query:
                params:
                - C
              reducer:
                params: []
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: B
            intervalMs: 1000
            maxDataPoints: 43200
            refId: C
            type: threshold
        noDataState: OK
        execErrState: Error
        isPaused: false
      - uid: homelab_deployment_replicas_unavailable
        title: homelab deployment replicas unavailable
        condition: C
        for: 10m
        annotations:
          summary: Deployment unavailable replicas on homelab namespace {{ $labels.namespace }} deployment {{ $labels.deployment }}
          description: 'Cluster homelab namespace {{ $labels.namespace }} deployment {{ $labels.deployment }} has unavailable replicas for more than 10 minutes (current value: {{ $value }}).'
        labels:
          severity: critical
          team: sre
          cluster: homelab
        data:
        - refId: A
          queryType: query
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: kube_deployment_status_replicas_unavailable
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: reduce
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            reducer: last
            refId: B
            type: reduce
        - refId: C
          queryType: threshold
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
              operator:
                type: and
              query:
                params:
                - C
              reducer:
                params: []
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: B
            intervalMs: 1000
            maxDataPoints: 43200
            refId: C
            type: threshold
        noDataState: OK
        execErrState: Error
        isPaused: false
      - uid: homelab_statefulset_replicas_unavailable
        title: homelab StatefulSet replicas unavailable
        condition: C
        for: 10m
        annotations:
          summary: StatefulSet unavailable replicas on homelab namespace {{ $labels.namespace }} StatefulSet {{ $labels.statefulset }}
          description: 'Cluster homelab namespace {{ $labels.namespace }} StatefulSet {{ $labels.statefulset }} has unavailable replicas for more than 10 minutes (current value: {{ $value }}).'
        labels:
          severity: critical
          team: sre
          cluster: homelab
        data:
        - refId: A
          queryType: query
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: kube_statefulset_status_replicas - kube_statefulset_status_replicas_ready
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: reduce
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            reducer: last
            refId: B
            type: reduce
        - refId: C
          queryType: threshold
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
              operator:
                type: and
              query:
                params:
                - C
              reducer:
                params: []
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: B
            intervalMs: 1000
            maxDataPoints: 43200
            refId: C
            type: threshold
        noDataState: OK
        execErrState: Error
        isPaused: false
      - uid: homelab_critical_prometheus_target_down
        title: homelab critical Prometheus target down
        condition: C
        for: 5m
        annotations:
          summary: Critical Prometheus target down on homelab job {{ $labels.job }} instance {{ $labels.instance }}
          description: 'Cluster homelab critical Prometheus target job {{ $labels.job }} on instance {{ $labels.instance }} has been down for more than 5 minutes (current value: {{ $value }}).'
        labels:
          severity: critical
          team: sre
          cluster: homelab
        data:
        - refId: A
          queryType: query
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: up{job=~"kube-state-metrics|kubelet|prometheus-kube-prometheus-operator"}
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: reduce
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            reducer: last
            refId: B
            type: reduce
        - refId: C
          queryType: threshold
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 1
                type: lt
              operator:
                type: and
              query:
                params:
                - C
              reducer:
                params: []
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: B
            intervalMs: 1000
            maxDataPoints: 43200
            refId: C
            type: threshold
        noDataState: Alerting
        execErrState: Error
        isPaused: false

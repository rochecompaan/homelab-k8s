        condition: C
        for: 5m
        annotations:
          summary: node-exporter target down on homelab node {{ $labels.instance }}
          description: Cluster homelab node-exporter target for {{ $labels.instance }} has been below 1 for 5 minutes or telemetry is missing.
        labels:
          severity: critical
          team: sre
          cluster: homelab
        data:
        - refId: A
          queryType: query
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:

apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-node-resources
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  node-resources.yml: |
    apiVersion: 1
    groups:
    - orgId: 1
      name: Node Resources - homelab
      folder: Homelab Alerts
      interval: 1m
      rules:
      - uid: homelab_node_filesystem_usage_warning
        title: homelab node filesystem usage above 80%
        condition: C
        for: 10m
        annotations:
          summary: Filesystem usage above 80% on homelab node {{ $labels.instance }} mount {{ $labels.mountpoint }}
          description: 'Cluster homelab node {{ $labels.instance }} mount {{ $labels.mountpoint }} on device {{ $labels.device }} is above 80% filesystem usage (current value: {{ $value }}).'
        labels:
          severity: warning
          team: sre
          cluster: homelab
        data:
        - refId: A
          queryType: query
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: 100 * (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|overlay|squashfs|proc|sysfs|cgroup2?",mountpoint!~"/run($|/.*)|/var/lib/kubelet/pods/.+|/var/lib/docker/.+|/var/lib/containerd/.+"} / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs|overlay|squashfs|proc|sysfs|cgroup2?",mountpoint!~"/run($|/.*)|/var/lib/kubelet/pods/.+|/var/lib/docker/.+|/var/lib/containerd/.+"})
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: reduce
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            reducer: last
            refId: B
            type: reduce
        - refId: C
          queryType: threshold
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 80
                type: gt
              operator:
                type: and
              query:
                params:
                - C
              reducer:
                params: []
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: B
            intervalMs: 1000
            maxDataPoints: 43200
            refId: C
            type: threshold
        noDataState: OK
        execErrState: Error
        isPaused: false
      - uid: homelab_node_filesystem_usage_critical
        title: homelab node filesystem usage above 90%
        condition: C
        for: 10m
        annotations:
          summary: Filesystem usage above 90% on homelab node {{ $labels.instance }} mount {{ $labels.mountpoint }}
          description: 'Cluster homelab node {{ $labels.instance }} mount {{ $labels.mountpoint }} on device {{ $labels.device }} is above 90% filesystem usage (current value: {{ $value }}).'
        labels:
          severity: critical
          team: sre
          cluster: homelab
        data:
        - refId: A
          queryType: query
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: prometheus
          model:
            expr: 100 * (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs|overlay|squashfs|proc|sysfs|cgroup2?",mountpoint!~"/run($|/.*)|/var/lib/kubelet/pods/.+|/var/lib/docker/.+|/var/lib/containerd/.+"} / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs|overlay|squashfs|proc|sysfs|cgroup2?",mountpoint!~"/run($|/.*)|/var/lib/kubelet/pods/.+|/var/lib/docker/.+|/var/lib/containerd/.+"})
            intervalMs: 1000
            maxDataPoints: 43200
            refId: A
        - refId: B
          queryType: reduce
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            datasource:
              type: __expr__
              uid: __expr__
            expression: A
            intervalMs: 1000
            maxDataPoints: 43200
            reducer: last
            refId: B
            type: reduce
        - refId: C
          queryType: threshold
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 90
                type: gt
              operator:
                type: and
              query:
                params:
                - C
              reducer:
                params: []
                type: last
              type: query
            datasource:
              type: __expr__
              uid: __expr__
            expression: B
            intervalMs: 1000
            maxDataPoints: 43200
            refId: C
            type: threshold
        noDataState: OK
        execErrState: Error
        isPaused: false
      - uid: homelab_node_memory_usage_warning

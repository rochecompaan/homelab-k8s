apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    cert-manager.io/cluster-issuer: compaan-ca
    argocd.argoproj.io/sync-wave: "2"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - longhorn.compaan
      secretName: longhorn-compaan-tls
  rules:
    - host: longhorn.compaan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: longhorn-compaan
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: longhorn-compaan-tls
  issuerRef:
    name: compaan-ca
    kind: ClusterIssuer
  commonName: longhorn.compaan
  dnsNames:
    - longhorn.compaan

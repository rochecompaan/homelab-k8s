apiVersion: v1
kind: Namespace
metadata:
  name: home-assistant
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant
  namespace: home-assistant
  annotations:
    cert-manager.io/cluster-issuer: compaan-ca
    argocd.argoproj.io/sync-wave: "2"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ha.compaan
      secretName: home-assistant-compaan-tls
  rules:
    - host: ha.compaan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: home-assistant
                port:
                  number: 8123
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-assistant-compaan
  namespace: home-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: home-assistant-compaan-tls
  issuerRef:
    name: compaan-ca
    kind: ClusterIssuer
  commonName: ha.compaan
  dnsNames:
    - ha.compaan

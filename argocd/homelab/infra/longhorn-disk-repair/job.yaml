apiVersion: batch/v1
kind: Job
metadata:
  name: longhorn-disk-repair-20260621
  labels:
    app.kubernetes.io/name: longhorn-disk-repair
    app.kubernetes.io/part-of: longhorn
spec:
  # Safety guard: this Job is intentionally dormant for review. To execute via
  # GitOps, include this kustomization in argocd/homelab/infra/kustomization.yaml
  # and change suspend to false in a reviewed commit.
  suspend: true
  backoffLimit: 0
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longhorn-disk-repair
        app.kubernetes.io/part-of: longhorn
    spec:
      serviceAccountName: longhorn-disk-repair
      automountServiceAccountToken: true
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: repair
          image: python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /scripts/repair-longhorn-disks.py
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: LONGHORN_NAMESPACE
              value: longhorn-system
            - name: CONFIRM_REPAIR
              value: clear stale longhorn disks
            - name: DRY_RUN
              value: "false"
            - name: DELETE_STALE_REPLICAS
              value: "true"
            - name: REQUIRED_READY_REASON
              value: DiskFilesystemChanged
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: repair-script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: repair-script
          configMap:
            name: longhorn-disk-repair-script
            defaultMode: 0555

apiVersion: batch/v1
kind: Job
metadata:
  name: piraeus-rwo-strict-cleanup-stale-lvs-dauwalter-run-002
  namespace: piraeus-datastore
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: piraeus-rwo-strict-stale-lv-cleanup
    storage.compaan.io/benchmark: rwo-strict
    storage.compaan.io/backend: piraeus
    storage.compaan.io/cleanup-node: dauwalter
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: piraeus-rwo-strict-stale-lv-cleanup
        storage.compaan.io/benchmark: rwo-strict
        storage.compaan.io/backend: piraeus
        storage.compaan.io/cleanup-node: dauwalter
    spec:
      restartPolicy: Never
      tolerations:
        - key: drbd.linbit.com/lost-quorum
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - dauwalter
      containers:
        - name: cleanup
          image: quay.io/piraeusdatastore/piraeus-server:v1.33.3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /scripts/cleanup-stale-piraeus-lvs.sh
          env:
            - name: CONFIRM_LVREMOVE
              value: remove known stale piraeus benchmark lvs
            - name: NODE_NAME
              value: dauwalter
            - name: VG_NAME
              value: vg-nvme
            - name: STALE_LVS
              value: >-
                pvc-4103d321-aaab-4c25-86aa-2dae2ffa7930_00000
                pvc-4103d321-aaab-4c25-86aa-2dae2ffa7930_00001
                pvc-494b412e-d23f-44c5-8996-caff4a09ec4c_00000
                pvc-494b412e-d23f-44c5-8996-caff4a09ec4c_00001
                pvc-e1455cd2-5669-4156-b3d0-4e1bb60a3b26_00000
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - SYS_ADMIN
              drop:
                - ALL
          volumeMounts:
            - name: cleanup-script
              mountPath: /scripts
              readOnly: true
            - name: dev
              mountPath: /dev
            - name: container-etc-lvm
              mountPath: /etc/lvm
            - name: etc-lvm-archive
              mountPath: /etc/lvm/archive
            - name: etc-lvm-backup
              mountPath: /etc/lvm/backup
            - name: run
              mountPath: /run
            - name: tmp
              mountPath: /tmp
            - name: run-lock-lvm
              mountPath: /run/lock/lvm
            - name: run-lvm
              mountPath: /run/lvm
            - name: run-udev
              mountPath: /run/udev
              readOnly: true
      volumes:
        - name: cleanup-script
          configMap:
            name: piraeus-rwo-strict-stale-lv-cleanup-script
            defaultMode: 0555
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        - name: etc-lvm-archive
          hostPath:
            path: /etc/lvm/archive
            type: DirectoryOrCreate
        - name: etc-lvm-backup
          hostPath:
            path: /etc/lvm/backup
            type: DirectoryOrCreate
        - name: run-lock-lvm
          hostPath:
            path: /run/lock/lvm
            type: DirectoryOrCreate
        - name: run-lvm
          hostPath:
            path: /run/lvm
            type: DirectoryOrCreate
        - name: run-udev
          hostPath:
            path: /run/udev
            type: Directory
        - name: container-etc-lvm
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---

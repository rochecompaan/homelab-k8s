apiVersion: v1
kind: ConfigMap
metadata:
  name: piraeus-finalizer-cleanup-script
  annotations:
    argocd.argoproj.io/sync-wave: '0'
data:
  cleanup.sh: |
    #!/bin/sh
    set -eu

    ARGO_NS=argocd
    PIRAEUS_NS=piraeus-datastore
    APP=storage-benchmark-rwo-strict-piraeus

    echo "Verifying no Piraeus benchmark PVCs remain"
    if kubectl get pvc -A --no-headers 2>/dev/null | grep -E 'piraeus-rwo-strict|piraeus-rwo-strict-pvc'; then
      echo "Refusing to patch finalizers while benchmark PVCs still exist" >&2
      exit 1
    fi

    echo "Verifying no Piraeus benchmark PVs remain"
    if kubectl get pv --no-headers 2>/dev/null | grep -E 'piraeus-rwo-strict|piraeus-rwo-strict-3r|pvc-ac332ab9-3c20-4c2b-9513-e14ca1a40a08'; then
      echo "Refusing to patch finalizers while benchmark PVs still exist" >&2
      exit 1
    fi

    volumes="$(kubectl -n "$PIRAEUS_NS" get linstorcluster.piraeus.io linstorcluster -o jsonpath='{.status.numberOfVolumes}' 2>/dev/null || true)"
    volumes="${volumes:-0}"
    echo "LinstorCluster reported volume count: $volumes"
    if [ "$volumes" != "0" ]; then
      echo "Refusing to patch finalizers while LINSTOR reports volumes" >&2
      exit 1
    fi

    for resource in linstorsatellites.piraeus.io linstorclusters.piraeus.io; do
      names="$(kubectl -n "$PIRAEUS_NS" get "$resource" -o name --ignore-not-found 2>/dev/null || true)"
      for name in $names; do
        echo "Removing finalizers from $name"
        kubectl -n "$PIRAEUS_NS" patch "$name" --type=merge -p '{"metadata":{"finalizers":[]}}'
      done
    done

    remaining=0
    for _ in $(seq 1 30); do
      remaining="$(kubectl -n "$PIRAEUS_NS" get linstorclusters.piraeus.io,linstorsatellites.piraeus.io -o name --ignore-not-found 2>/dev/null | wc -l | tr -d ' ')"
      echo "Remaining Piraeus CRs: $remaining"
      [ "$remaining" = "0" ] && break
      sleep 2
    done

    if [ "$remaining" != "0" ]; then
      echo "Piraeus CRs still remain after finalizer cleanup" >&2
      exit 1
    fi

    if kubectl -n "$ARGO_NS" get application.argoproj.io "$APP" >/dev/null 2>&1; then
      echo "Removing finalizer from terminating ArgoCD Application $APP"
      kubectl -n "$ARGO_NS" patch application.argoproj.io "$APP" --type=merge -p '{"metadata":{"finalizers":[]}}'
    else
      echo "ArgoCD Application $APP is already gone"
    fi

    echo "Piraeus finalizer cleanup complete"

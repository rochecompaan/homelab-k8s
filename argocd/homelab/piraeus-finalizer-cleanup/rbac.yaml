apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: piraeus-finalizer-cleanup
  annotations:
    argocd.argoproj.io/sync-wave: '0'
rules:
  - apiGroups:
      - piraeus.io
    resources:
      - linstorclusters
      - linstorsatellites
      - linstorsatelliteconfigurations
    verbs:
      - get
      - list
      - patch
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - patch
  - apiGroups:
      - ''
    resources:
      - persistentvolumes
      - persistentvolumeclaims
    verbs:
      - get
      - list
  - apiGroups:
      - storage.k8s.io
    resources:
      - storageclasses
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: piraeus-finalizer-cleanup
  annotations:
    argocd.argoproj.io/sync-wave: '0'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: piraeus-finalizer-cleanup
subjects:
  - kind: ServiceAccount
    name: piraeus-finalizer-cleanup
    namespace: argocd

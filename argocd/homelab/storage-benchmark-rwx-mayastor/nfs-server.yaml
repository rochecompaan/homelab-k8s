apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mayastor-rwx-nfs-backend-pvc-run-001
  namespace: storage-benchmark-rwx
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: storage-benchmark-rwx
    storage.compaan.io/backend: mayastor-rwx
    storage.compaan.io/role: nfs-backend
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: mayastor-rwx-backend-3r
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mayastor-rwx-nfs-server
  namespace: storage-benchmark-rwx
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: storage-benchmark-rwx
    storage.compaan.io/backend: mayastor-rwx
    storage.compaan.io/role: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mayastor-rwx-nfs-server
  template:
    metadata:
      labels:
        app: mayastor-rwx-nfs-server
        app.kubernetes.io/name: storage-benchmark-rwx
        storage.compaan.io/backend: mayastor-rwx
        storage.compaan.io/role: nfs-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: fordyce
      containers:
        - name: nfs-server
          image: itsthenetwork/nfs-server-alpine:latest
          env:
            - name: SHARED_DIRECTORY
              value: /nfsshare
          ports:
            - name: nfs
              containerPort: 2049
          securityContext:
            privileged: true
          volumeMounts:
            - name: nfs-vol
              mountPath: /nfsshare
      volumes:
        - name: nfs-vol
          persistentVolumeClaim:
            claimName: mayastor-rwx-nfs-backend-pvc-run-001
---
apiVersion: v1
kind: Service
metadata:
  name: mayastor-rwx-nfs-server
  namespace: storage-benchmark-rwx
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: storage-benchmark-rwx
    storage.compaan.io/backend: mayastor-rwx
    storage.compaan.io/role: nfs-server
spec:
  type: ClusterIP
  selector:
    app: mayastor-rwx-nfs-server
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049

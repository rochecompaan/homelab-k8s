apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coturn
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: coturn
    spec:
      initContainers:
        - name: render-config
          image: busybox:1.36.1
          command:
            - sh
            - -ec
            - |
              secret="$(tr -d '\n' < /etc/coturn-secret/registration_shared_secret)"
              sed "s|__TURN_SHARED_SECRET__|$secret|g" \
                /etc/coturn-template/turnserver.conf \
                > /etc/coturn/turnserver.conf
          volumeMounts:
            - name: config
              mountPath: /etc/coturn
            - name: secret
              mountPath: /etc/coturn-secret
              readOnly: true
            - name: template
              mountPath: /etc/coturn-template
              readOnly: true
      containers:
        - name: coturn
          image: coturn/coturn:4.6.3
          args:
            - -c
            - /etc/coturn/turnserver.conf
            - --log-file=stdout
          ports:
            - containerPort: 3478
              name: turn-tcp
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 3478
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3478
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/coturn
              readOnly: true
      volumes:
        - name: config
          emptyDir: {}
        - name: secret
          secret:
            secretName: matrix
            items:
              - key: registration_shared_secret
                path: registration_shared_secret
        - name: template
          configMap:
            name: coturn
            items:
              - key: turnserver.conf
                path: turnserver.conf

apiVersion: batch/v1
kind: Job
metadata:
  name: longhorn-nvme-disk-tagger-20260630
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: longhorn-nvme-disk-tagger
    app.kubernetes.io/part-of: storage-benchmark-v2
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longhorn-nvme-disk-tagger
        app.kubernetes.io/part-of: storage-benchmark-v2
    spec:
      serviceAccountName: longhorn-nvme-disk-tagger
      automountServiceAccountToken: true
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tagger
          image: python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /scripts/tag-longhorn-nvme-disks.py
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: LONGHORN_NAMESPACE
              value: longhorn-system
            - name: TARGET_PATH
              value: /var/lib/longhorn/
            - name: TAG
              value: nvme
            - name: CONFIRM_TAG_NVME
              value: tag longhorn nvme disks
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: tagger-script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: tagger-script
          configMap:
            name: longhorn-nvme-disk-tagger-script
            defaultMode: 0555
